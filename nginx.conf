# PixelFlow Nginx 配置
# 所有流量通过 Nginx 统一入口，反向代理到主机上的各服务进程
#
# 流量路径:
#   /pixelflow/*        -> Next.js  :3001
#   /api/*              -> FastAPI  :8000
#   /ws/*               -> FastAPI  :8000 (WebSocket)
#   /pixelflow-media/*  -> MinIO    :9000
#
# 使用方式:
#   sudo cp nginx.conf /etc/nginx/conf.d/pixelflow.conf
#   sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    # --- Frontend (Next.js, basePath = /pixelflow) ---
    location /pixelflow/ {
        proxy_pass http://127.0.0.1:3001/pixelflow/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Backend API (FastAPI) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # --- WebSocket (FastAPI) ---
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # --- MinIO 媒体文件 (对象存储) ---
    location /pixelflow-media/ {
        proxy_pass http://127.0.0.1:9000/pixelflow-media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 健康检查 ---
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # --- 默认重定向 ---
    location = / {
        return 302 /pixelflow/;
    }
}
