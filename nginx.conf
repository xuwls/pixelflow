server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # Frontend (basePath = /pixelflow)
    location /pixelflow/ {
        proxy_pass http://frontend:3000/pixelflow/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # MinIO media files（basePath 下的媒体请求）
    location /pixelflow/pixelflow-media/ {
        rewrite ^/pixelflow/pixelflow-media/(.*) /pixelflow-media/$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
    }

    # MinIO media files（直接请求）
    location /pixelflow-media/ {
        proxy_pass http://minio:9000/pixelflow-media/;
        proxy_set_header Host $host;
    }

    # 默认重定向
    location = / {
        return 302 /pixelflow/;
    }
}
