services:
  postgres:
    image: postgres:16-alpine
    container_name: pixelflow-postgres
    restart: always
    environment:
      POSTGRES_DB: pixelflow
      POSTGRES_USER: pixelflow
      POSTGRES_PASSWORD: pixelflow_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pixelflow-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pixelflow-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: pixelflow-backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pixelflow:pixelflow_prod@postgres:5432/pixelflow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: pixelflow-media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - media_work:/app/media_work

  celery-worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: pixelflow-worker
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 --pool=prefork
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pixelflow:pixelflow_prod@postgres:5432/pixelflow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: pixelflow-media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - media_work:/app/media_work

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    container_name: pixelflow-frontend
    restart: always
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://124.220.64.31:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://124.220.64.31:8000/ws
      NEXT_PUBLIC_STORAGE_URL: /pixelflow-media
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  media_work:
